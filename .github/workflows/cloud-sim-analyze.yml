name: Cloud Simulation - Analysis Session
run-name: Cloud Simulation Analysis ${{ inputs.operation }} ${{ inputs.request_id }}

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Session operation used by scripts/cloud-sim/analyze.sh
        required: true
        default: prepare
        type: choice
        options:
          - prepare
          - close
      run_id:
        description: Exact Simulation Run identity; there is no latest selector
        required: true
        type: string
      request_id:
        description: Unique local request correlation identifier
        required: true
        type: string
      client_ipv4:
        description: Local Codex public IPv4 for the bounded Analysis Access Window
        required: false
        default: ""
        type: string
      client_public_key:
        description: Base64 PEM RSA public key used to encrypt the Analysis Token
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  # Cleanup and session changes share the repository-wide cloud mutation lock.
  group: cloud-simulation-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare encrypted local Codex session
    if: inputs.operation == 'prepare'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: cloud-sim-analysis
    permissions:
      contents: read
      actions: read
      id-token: write
    env:
      GOWORK: "off"
      RUN_ID: ${{ inputs.run_id }}
      REQUEST_ID: ${{ inputs.request_id }}
      CLIENT_IPV4: ${{ inputs.client_ipv4 }}
      CLIENT_PUBLIC_KEY: ${{ inputs.client_public_key }}
      PROVIDER_CONFIG_JSON: ${{ vars.ALIBABA_CLOUD_SIM_CONFIG_JSON }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Validate local session request
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RUN_ID" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]
          [[ "$REQUEST_ID" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{7,63}$ ]]
          [[ "$CLIENT_IPV4" =~ ^[0-9]{1,3}(\.[0-9]{1,3}){3}$ ]]
          test "${#CLIENT_PUBLIC_KEY}" -ge 256
          test "${#CLIENT_PUBLIC_KEY}" -le 4096
          mkdir -p session locator
      - name: Resolve exact retained Run Locator
        id: locator
        shell: bash
        run: |
          set -euo pipefail
          artifact_name="cloud-sim-locator-${RUN_ID}"
          artifacts="$(gh api -X GET "repos/${GITHUB_REPOSITORY}/actions/artifacts" -f name="$artifact_name" -f per_page=2)"
          count="$(jq -r '.artifacts | length' <<<"$artifacts")"
          if [[ "$count" != "1" ]]; then
            echo "state=unknown_run" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          artifact_id="$(jq -er '.artifacts[0].id' <<<"$artifacts")"
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" >locator.zip
          unzip -q locator.zip -d locator
          test -f locator/run-locator.json
          test "$(jq -er .run_id locator/run-locator.json)" = "$RUN_ID"
          source_sha="$(jq -er '.source_sha | select(test("^[0-9a-f]{40}$"))' locator/run-locator.json)"
          scenario_digest="$(jq -er '.scenario_digest | select(test("^sha256:[0-9a-f]{64}$"))' locator/run-locator.json)"
          echo "source_sha=$source_sha" >>"$GITHUB_OUTPUT"
          echo "scenario_digest=$scenario_digest" >>"$GITHUB_OUTPUT"
          echo "state=found" >>"$GITHUB_OUTPUT"
      - name: Obtain short-lived Alibaba analyzer identity
        if: steps.locator.outputs.state == 'found'
        uses: aliyun/configure-aliyun-credentials-action@1e5248c8d5d93a8781ac344a68e19a43341e79e6 # v1.1.0
        with:
          role-to-assume: ${{ vars.ALIBABA_CLOUD_SIM_ANALYZER_ROLE_ARN }}
          oidc-provider-arn: ${{ vars.ALIBABA_CLOUD_SIM_OIDC_PROVIDER_ARN }}
          audience: ${{ vars.ALIBABA_CLOUD_SIM_OIDC_AUDIENCE }}
          role-session-name: wukongim-cloud-sim-analysis-${{ github.run_id }}
      - name: Bind locator to current provider inventory
        id: preflight
        if: steps.locator.outputs.state == 'found'
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$PROVIDER_CONFIG_JSON" >provider.json
          go build -trimpath -o wkcloudsim ./cmd/wkcloudsim
          if ! ./wkcloudsim --provider alibaba --provider-config provider.json preflight \
            --locator locator/run-locator.json >preflight.json; then
            echo "state=insufficient_evidence" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          state="$(jq -er .state preflight.json)"
          echo "state=$state" >>"$GITHUB_OUTPUT"
          if [[ "$state" == live ]]; then
            jq -e .run preflight.json >run.json
          fi
      - name: Open temporary runner exchange window
        id: ingress
        if: steps.preflight.outputs.state == 'live'
        shell: bash
        run: |
          set -euo pipefail
          runner_ip="$(curl --fail --silent --show-error --proto '=https' --tlsv1.2 https://api.ipify.org)"
          until="$(date -u -d '+10 minutes' +%Y-%m-%dT%H:%M:%SZ)"
          ./wkcloudsim --provider alibaba --provider-config provider.json open-analysis "$RUN_ID" \
            --source "${runner_ip}/32" --until "$until" >/dev/null
          echo "opened=true" >>"$GITHUB_OUTPUT"
      - name: Encrypt handoff and move ingress to local Codex
        id: handoff
        if: steps.ingress.outputs.opened == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          sim_ip="$(jq -er '.resources[] | select(.kind=="public-address" and .role=="sim") | .public_address' run.json)"
          expected_fingerprint="$(jq -er '.tags["wukongim-mcp-cert-fingerprint"]' run.json)"
          timeout 15 openssl s_client -showcerts -connect "${sim_ip}:19092" </dev/null 2>/dev/null \
            | awk '/-----BEGIN CERTIFICATE-----/{capture=1} capture{print} /-----END CERTIFICATE-----/{capture=0}' >certificate-chain.pem
          test -s certificate-chain.pem
          awk '/-----BEGIN CERTIFICATE-----/{n++; file=sprintf("certificate-%d.pem",n)} file{print >file} /-----END CERTIFICATE-----/{close(file);file=""}' certificate-chain.pem
          matched=""
          for certificate in certificate-*.pem; do
            fingerprint="sha256:$(openssl x509 -in "$certificate" -outform DER | sha256sum | awk '{print $1}')"
            if [[ "$fingerprint" == "$expected_fingerprint" ]]; then
              cp "$certificate" pinned-ca.pem
              matched=true
            fi
          done
          test "$matched" = true
          openssl verify -CAfile pinned-ca.pem certificate-1.pem
          timeout 15 openssl s_client -connect "${sim_ip}:19092" -CAfile pinned-ca.pem \
            -verify_return_error -verify_ip "$sim_ip" </dev/null >/dev/null

          audience="wukongim-cloud-sim:${RUN_ID}"
          encoded_audience="$(jq -nr --arg value "$audience" '$value|@uri')"
          oidc_token="$(curl --fail --silent --show-error -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${encoded_audience}" | jq -er .value)"
          token_response="$(curl --fail --silent --show-error --cacert pinned-ca.pem \
            -H "Authorization: Bearer ${oidc_token}" -X POST "https://${sim_ip}:19092/analysis/token")"
          analysis_token="$(jq -er .access_token <<<"$token_response")"
          expires_at="$(jq -er .expires_at <<<"$token_response")"
          echo "::add-mask::$analysis_token"

          printf '%s' "$CLIENT_PUBLIC_KEY" | base64 --decode >session/client-public.pem
          openssl pkey -pubin -in session/client-public.pem -noout
          printf '%s' "$analysis_token" | openssl pkeyutl -encrypt -pubin \
            -inkey session/client-public.pem -pkeyopt rsa_padding_mode:oaep \
            -pkeyopt rsa_oaep_md:sha256 -out session/encrypted-token.bin
          rm -f session/client-public.pem
          cp pinned-ca.pem session/pinned-ca.pem
          ca_fingerprint="sha256:$(openssl x509 -in pinned-ca.pem -outform DER | sha256sum | awk '{print $1}')"

          ./wkcloudsim --provider alibaba --provider-config provider.json close-analysis "$RUN_ID"
          ./wkcloudsim --provider alibaba --provider-config provider.json open-analysis "$RUN_ID" \
            --source "${CLIENT_IPV4}/32" --until "$expires_at" >/dev/null
          jq -n --arg run_id "$RUN_ID" --arg request_id "$REQUEST_ID" \
            --arg source_sha '${{ steps.locator.outputs.source_sha }}' \
            --arg scenario_digest '${{ steps.locator.outputs.scenario_digest }}' \
            --arg mcp_url "https://${sim_ip}:19092/mcp" --arg expires_at "$expires_at" \
            --arg ca_fingerprint "$ca_fingerprint" \
            '{schema:"wukongim/cloud-simulation-analysis-session/v1",state:"live",run_id:$run_id,
              request_id:$request_id,source_sha:$source_sha,scenario_digest:$scenario_digest,
              mcp_url:$mcp_url,expires_at:$expires_at,ca_fingerprint:$ca_fingerprint}' >session/session.json
          analysis_token=""
          echo "client_window=true" >>"$GITHUB_OUTPUT"
      - name: Materialize terminal session state
        if: always()
        shell: bash
        env:
          LOCATOR_STATE: ${{ steps.locator.outputs.state }}
          PREFLIGHT_STATE: ${{ steps.preflight.outputs.state }}
        run: |
          set -euo pipefail
          rm -f session/client-public.pem
          if [[ -f session/session.json ]]; then exit 0; fi
          rm -f session/encrypted-token.bin session/pinned-ca.pem
          state=insufficient_evidence
          message="Analysis session handoff failed before a live MCP session was established."
          if [[ "$LOCATOR_STATE" == unknown_run ]]; then
            state=unknown_run
            message="No unique retained Run Locator exists for the exact Run Identity."
          elif [[ "$PREFLIGHT_STATE" == released ]]; then
            state=released
            message="Simulation Run ${RUN_ID} 已由云厂商确认自动销毁，当前没有可分析的实时数据；分析已终止。"
          elif [[ "$PREFLIGHT_STATE" != live ]]; then
            message="Provider preflight could not establish a live identity-matched Simulation Run."
          fi
          jq -n --arg run_id "$RUN_ID" --arg request_id "$REQUEST_ID" --arg state "$state" --arg message "$message" \
            '{schema:"wukongim/cloud-simulation-analysis-session/v1",state:$state,run_id:$run_id,
              request_id:$request_id,message:$message}' >session/session.json
      - name: Close failed temporary exchange window
        if: always() && steps.ingress.outputs.opened == 'true' && steps.handoff.outputs.client_window != 'true'
        continue-on-error: true
        shell: bash
        run: ./wkcloudsim --provider alibaba --provider-config provider.json close-analysis "$RUN_ID"
      - name: Upload encrypted one-day local handoff
        if: always() && hashFiles('session/session.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloud-sim-analysis-session-${{ inputs.request_id }}
          path: session/
          retention-days: 1
          if-no-files-found: error
      - name: Write session summary
        if: always() && hashFiles('session/session.json') != ''
        shell: bash
        run: |
          {
            echo '## Cloud Simulation local analysis session'
            echo
            echo "- Run Identity: \`$RUN_ID\`"
            echo "- State: \`$(jq -r .state session/session.json)\`"
            echo "- Request: \`$REQUEST_ID\`"
            if [[ "$(jq -r .state session/session.json)" == released ]]; then
              echo "- $(jq -r .message session/session.json)"
            fi
          } >>"$GITHUB_STEP_SUMMARY"

  close:
    name: Close local Codex session
    if: inputs.operation == 'close'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: cloud-sim-analysis
    permissions:
      contents: read
      id-token: write
    env:
      GOWORK: "off"
      RUN_ID: ${{ inputs.run_id }}
      REQUEST_ID: ${{ inputs.request_id }}
      PROVIDER_CONFIG_JSON: ${{ vars.ALIBABA_CLOUD_SIM_CONFIG_JSON }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Validate close request
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RUN_ID" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]
          [[ "$REQUEST_ID" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{7,63}$ ]]
      - name: Obtain short-lived Alibaba analyzer identity
        uses: aliyun/configure-aliyun-credentials-action@1e5248c8d5d93a8781ac344a68e19a43341e79e6 # v1.1.0
        with:
          role-to-assume: ${{ vars.ALIBABA_CLOUD_SIM_ANALYZER_ROLE_ARN }}
          oidc-provider-arn: ${{ vars.ALIBABA_CLOUD_SIM_OIDC_PROVIDER_ARN }}
          audience: ${{ vars.ALIBABA_CLOUD_SIM_OIDC_AUDIENCE }}
          role-session-name: wukongim-cloud-sim-analysis-close-${{ github.run_id }}
      - name: Close Analysis Access Window
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$PROVIDER_CONFIG_JSON" >provider.json
          go build -trimpath -o wkcloudsim ./cmd/wkcloudsim
          ./wkcloudsim --provider alibaba --provider-config provider.json close-analysis "$RUN_ID"
