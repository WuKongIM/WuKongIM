name: Cloud Simulation - Cleanup
run-name: Cloud Simulation Cleanup ${{ inputs.run_id || 'scheduled-sweep' }} ${{ inputs.request_id || github.run_id }}

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional exact Simulation Run identity for protected early destruction
        required: false
        default: ""
        type: string
      request_id:
        description: Optional finalize request correlation identifier
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: cloud-simulation-${{ github.repository }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Reconcile expired or selected Alibaba resources
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: cloud-sim-cleanup
    permissions:
      contents: read
      actions: read
      id-token: write
    env:
      GOWORK: "off"
      RUN_ID: ${{ inputs.run_id || '' }}
      REQUEST_ID: ${{ inputs.request_id || '' }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Validate cleanup request
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$REQUEST_ID" ]]; then
            [[ "$REQUEST_ID" =~ ^finalize-[0-9a-f]{16}$ ]]
            [[ -n "$RUN_ID" ]]
          fi
      - name: Resolve Alibaba credential mode
        id: alibaba_auth
        shell: bash
        env:
          ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: ./scripts/cloud-sim/resolve-alibaba-credential-mode.sh
      - name: Obtain short-lived Alibaba provisioner identity
        if: steps.alibaba_auth.outputs.mode == 'oidc'
        uses: aliyun/configure-aliyun-credentials-action@1e5248c8d5d93a8781ac344a68e19a43341e79e6 # v1.1.0
        with:
          role-to-assume: ${{ vars.ALIBABA_CLOUD_SIM_PROVISIONER_ROLE_ARN }}
          oidc-provider-arn: ${{ vars.ALIBABA_CLOUD_SIM_OIDC_PROVIDER_ARN }}
          audience: ${{ vars.ALIBABA_CLOUD_SIM_OIDC_AUDIENCE }}
          role-session-name: wukongim-cloud-sim-cleanup-${{ github.run_id }}
      - name: Build trusted cleanup control plane
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath -o wkcloudsim ./cmd/wkcloudsim
      - name: Resolve retained provider configs
        id: configs
        shell: bash
        env:
          LEGACY_PROVIDER_CONFIG_JSON: ${{ vars.ALIBABA_CLOUD_SIM_CONFIG_JSON }}
        run: |
          set -euo pipefail
          mkdir -p provider-configs downloads
          retain_config() {
            local source="$1"
            jq -e '
              .region | type == "string" and length > 0
            ' "$source" >/dev/null
            jq -e '.account_id_hash | test("^sha256:[0-9a-f]{64}$")' "$source" >/dev/null
            normalized="$(jq -cS . "$source")"
            digest="$(printf '%s' "$normalized" | sha256sum | awk '{print $1}')"
            printf '%s\n' "$normalized" >"provider-configs/${digest}.json"
          }
          download_config() {
            local artifact_id="$1"
            local destination="downloads/${artifact_id}"
            mkdir -p "$destination"
            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" >"${destination}.zip"
            unzip -q "${destination}.zip" -d "$destination"
            test -f "$destination/provider.json"
            retain_config "$destination/provider.json"
          }

          if [[ -n "$RUN_ID" ]]; then
            ./scripts/cloud-sim/resolve-exact-provider-config.sh "$RUN_ID" downloads/exact-provider.json
            retain_config downloads/exact-provider.json
          else
            gh api --paginate -X GET "repos/${GITHUB_REPOSITORY}/actions/artifacts" -f per_page=100 \
              --jq '.artifacts[] | select(.expired == false and (.name | startswith("cloud-sim-provider-config"))) | [.id,.name] | @tsv' \
              >downloads/provider-artifacts.tsv
            ./scripts/cloud-sim/select-provider-config-artifacts.sh \
              <downloads/provider-artifacts.tsv >downloads/artifact-ids
            while IFS= read -r artifact_id; do
              [[ "$artifact_id" =~ ^[0-9]+$ ]] || continue
              download_config "$artifact_id"
            done <downloads/artifact-ids
            if [[ -n "$LEGACY_PROVIDER_CONFIG_JSON" ]]; then
              printf '%s' "$LEGACY_PROVIDER_CONFIG_JSON" >downloads/legacy-provider.json
              retain_config downloads/legacy-provider.json
            fi
          fi
          config_count="$(find provider-configs -type f -name '*.json' | wc -l | tr -d ' ')"
          echo "config_count=$config_count" >>"$GITHUB_OUTPUT"
      - name: Destroy exact run or sweep all expired leases
        id: reconcile
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$RUN_ID" ]]; then
            provider_config="$(find provider-configs -type f -name '*.json' -print -quit)"
            test -n "$provider_config"
            ./wkcloudsim --provider alibaba --provider-config "$provider_config" destroy "$RUN_ID" >cleanup-result.json
            jq -e '.state == "released" and (.resources | length) == 0' cleanup-result.json >/dev/null
            echo "mode=destroy" >>"$GITHUB_OUTPUT"
          else
            mkdir -p sweep-results
            sweep_status=0
            index=0
            while IFS= read -r provider_config; do
              index=$((index + 1))
              if ! ./wkcloudsim --provider alibaba --provider-config "$provider_config" sweep >"sweep-results/${index}.json"; then
                sweep_status=1
              fi
              jq -e '.destroyed != null and .failed != null' "sweep-results/${index}.json" >/dev/null
            done < <(find provider-configs -type f -name '*.json' | sort)
            if [[ "$index" == 0 ]]; then
              printf '%s\n' '{"destroyed":[],"failed":[]}' >cleanup-result.json
            else
              jq -s '{destroyed:(map(.destroyed // []) | add),failed:(map(.failed // []) | add)}' \
                sweep-results/*.json >cleanup-result.json
            fi
            jq -e '(.failed | length) == 0' cleanup-result.json >/dev/null
            test "$sweep_status" == 0
            echo "mode=sweep" >>"$GITHUB_OUTPUT"
          fi
      - name: Write cleanup reconciliation summary
        if: always()
        shell: bash
        env:
          MODE: ${{ steps.reconcile.outputs.mode }}
        run: |
          {
            echo '## Cloud Simulation cleanup'
            echo
            echo "- Mode: \`${MODE:-failed-before-reconcile}\`"
            if [[ -n "$RUN_ID" ]]; then echo "- Run Identity: \`$RUN_ID\`"; fi
            if [[ -f cleanup-result.json ]]; then
              if [[ "${MODE:-}" == destroy ]]; then
                echo "- Final state: \`$(jq -r .state cleanup-result.json)\`"
                echo "- Residual resources: \`$(jq -r '.resources | length' cleanup-result.json)\`"
              else
                echo "- Destroyed expired runs: \`$(jq -r '.destroyed | length' cleanup-result.json)\`"
                echo "- Failed reconciliations: \`$(jq -r '.failed | length' cleanup-result.json)\`"
              fi
            fi
          } >>"$GITHUB_STEP_SUMMARY"
