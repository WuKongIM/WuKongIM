name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify Go toolchain
        run: test "$(go env GOVERSION)" = "go1.25.11"
      - name: Check tracked Go formatting
        shell: bash
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          test "${#go_files[@]}" -gt 0
          unformatted="$(gofmt -l "${go_files[@]}")"
          if [[ -n "$unformatted" ]]; then
            echo "The following tracked Go files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - name: Check module metadata
        run: go mod tidy -diff
      - name: Vet explicit roots
        run: go vet ./cmd/... ./internal/... ./pkg/... ./scripts/... ./docker/...

  go-unit:
    name: Go unit (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GOWORK: "off"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cmd
            packages: "./cmd/..."
          - name: internal
            packages: "./internal/..."
          - name: pkg
            packages: "./pkg/..."
          - name: scripts-docker
            packages: "./scripts/... ./docker/..."
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify Go toolchain
        run: test "$(go env GOVERSION)" = "go1.25.11"
      - name: Run unit group
        shell: bash
        env:
          PACKAGES: ${{ matrix.packages }}
        run: go test $PACKAGES -count=1 -timeout=14m

  web:
    name: Web
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"
      - name: Verify Bun version
        run: test "$(bun --version)" = "1.3.11"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint against baseline
        run: bun run lint
      - name: Test
        run: bun run test
      - name: Type check
        run: bunx tsc -b
      - name: Build
        run: bun run build
      - name: Check deterministic tracked build output
        run: git diff --exit-code -- dist/index.html
