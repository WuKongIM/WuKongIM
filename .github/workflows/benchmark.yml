name: Benchmark

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmark on base branch
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          go test -bench=. -benchmem -count=5 -run='^$' -timeout 30m ./... | tee base.txt
          git checkout -

      - name: Run benchmark on PR branch
        run: |
          go test -bench=. -benchmem -count=5 -run='^$' -timeout 30m ./... | tee pr.txt

      - name: Compare benchmarks
        id: benchstat
        run: |
          result=$(benchstat base.txt pr.txt 2>&1 || true)
          {
            echo 'BENCHSTAT<<EOF'
            echo "$result"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Benchmark Results

            <details>
            <summary>benchstat output</summary>

            \`\`\`
            ${{ steps.benchstat.outputs.BENCHSTAT }}
            \`\`\`

            </details>

            _Generated by CI — comparing \`${{ github.event.pull_request.base.sha }}\` (base) vs \`${{ github.event.pull_request.head.sha }}\` (PR)_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Benchmark Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
