services:
  wk-node1:
    image: wukongim-dev:local
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./docker/conf/node1.toml:/etc/wukongim/wukongim.toml:ro
      - ./docker/dev-cluster/node1:/var/lib/wukongim
    tmpfs:
      - /run/wukongim
    ports:
      - "15001:5001"
      - "15100:5100"
      - "15200:5200"
      - "17100:7000"

  wk-node2:
    image: wukongim-dev:local
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./docker/conf/node2.toml:/etc/wukongim/wukongim.toml:ro
      - ./docker/dev-cluster/node2:/var/lib/wukongim
    tmpfs:
      - /run/wukongim
    ports:
      - "15002:5001"
      - "15101:5100"
      - "15201:5200"
      - "17001:7000"

  wk-node3:
    image: wukongim-dev:local
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./docker/conf/node3.toml:/etc/wukongim/wukongim.toml:ro
      - ./docker/dev-cluster/node3:/var/lib/wukongim
    tmpfs:
      - /run/wukongim
    ports:
      - "15003:5001"
      - "15102:5100"
      - "15202:5200"
      - "17002:7000"

  wk-sim:
    profiles: ["dev-sim"]
    image: wukongim-dev:local
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - wk-node1
      - wk-node2
      - wk-node3
    entrypoint:
      - /usr/local/bin/wkbench
    command:
      - dev-sim
      - --config
      - /etc/wkbench/dev-sim.yaml
    environment:
      # Default Compose simulator target: 500 person channels + 500 group channels
      # at 0.25 msg/s each, roughly 250 ingress messages per second. Receive
      # verification defaults to none so local send pressure is not throttled.
      WK_SIM_USERS: ${WK_SIM_USERS:-1000}
      WK_SIM_PERSON_CHANNELS: ${WK_SIM_PERSON_CHANNELS:-500}
      WK_SIM_GROUP_CHANNELS: ${WK_SIM_GROUP_CHANNELS:-500}
      WK_SIM_GROUP_MEMBERS: ${WK_SIM_GROUP_MEMBERS:-10}
      WK_SIM_RATE: ${WK_SIM_RATE:-0.25/s}
      WK_SIM_TRAFFIC_CONCURRENCY: ${WK_SIM_TRAFFIC_CONCURRENCY:-128}
      WK_SIM_WARMUP: ${WK_SIM_WARMUP:-10s}
      WK_SIM_VERIFY_RECV: ${WK_SIM_VERIFY_RECV:-none}
      WK_SIM_UID_PREFIX: ${WK_SIM_UID_PREFIX:-devsim-u}
    volumes:
      - ./docker/sim:/etc/wkbench:ro
      - ./docker/dev-sim:/var/lib/wkbench
    ports:
      - "19091:19091"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:19091/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6

  wk-web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      - wk-node1
    environment:
      WK_WEB_API_URL: ${WK_WEB_API_URL:-http://wk-node1:5301}
    ports:
      - "18080:80"

  prometheus:
    image: prom/prometheus:v3
    restart: unless-stopped
    depends_on:
      - wk-node1
      - wk-node2
      - wk-node3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/dev-observability/prometheus:/prometheus
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:13.1.0-24485707904
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: Aa12345678
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./docker/dev-observability/grafana:/var/lib/grafana
    ports:
      - "3000:3000"
